function cambiarTab(tab) {
  tabActivo = tab;
  ["especiales","extras","campeon","presel"].forEach(function(t){
    document.getElementById("tab-"+t).className       = "pr-tab"+(t===tab?" activo":"");
    document.getElementById("panel-"+t).style.display = t===tab?"block":"none";

  if(tab==="extras")     cargarExtras();
  if(tab==="campeon")    cargarCampeon();
  if(tab==="presel")     cargarPresel();

window.calcularTercerPuestoUI = function() {
  var cat     = document.getElementById("tp-cat").value;
  var deporte = document.getElementById("tp-deporte").value;
  var res     = document.getElementById("tp-resultado");
  var esFutsal  = deporte.indexOf("Futsal")   !== -1;
  var esVoleibol= deporte.indexOf("Voleibol") !== -1;

  var catLabel = cat==="3" ? "Grado 3\xB0" : cat==="45" ? "Grados 4\xB0-5\xB0" : "Grados 6\xB0-7\xB0";

  res.innerHTML='<div class="cargando"><div class="cargando-spinner"></div>Calculando '+catLabel+' \xB7 '+deporte+'...</div>';

  google.script.run
    .withSuccessHandler(function(r){
      if(r && r.ok && r.datos){
        var d = r.datos;
        var criterioIcon = esFutsal ? "\uD83E\uDD1D" : "\uD83C\uDFC5";
        var critColor    = esFutsal ? "#0f6e56" : "#6b21a8";
        var bgColor      = esFutsal ? "#e6f4ed" : "#f3e8ff";
        var bdColor      = esFutsal ? "rgba(26,122,74,.3)" : "rgba(147,51,234,.3)";

        if(d.tercero){
          var t = d.tercero;
          var notaPartido = (cat==="3" && esFutsal && d.juega_partido)
            ? '<div style="font-size:10px;color:#92400e;margin-top:4px;background:#fef3c7;padding:4px 8px;border-radius:6px;">'+
                '\uD83C\uDFC1 Este grado s\xED juega partido. Criterio aplica en empate.</div>'
            : '';
          res.innerHTML=
            '<div style="background:'+bgColor+';border:1px solid '+bdColor+';border-radius:10px;padding:12px 14px;">'+
              '<div style="font-size:11px;font-weight:700;color:'+critColor+';margin-bottom:4px;">'+
                criterioIcon+' 3er Puesto \u2014 '+catLabel+' \xB7 '+deporte+
              '</div>'+
              '<div style="font-size:16px;font-weight:800;color:#0d1117;">'+(t.pais||t.grupo||t.id_equipo)+'</div>'+
              '<div style="font-size:11px;color:#475569;margin-top:3px;">Grupo '+t.grupo+' \xB7 '+d.criterio+'</div>'+
              (t.puntos_neg!==undefined?'<div style="font-size:11px;color:#475569;">\uD83D\uDEA8 Puntos negativos: '+t.puntos_neg+'</div>':'')+
              (t.gf!==undefined?'<div style="font-size:11px;color:#475569;">\u26A1 Puntos realizados: '+t.gf+'</div>':'')+
              notaPartido+
            '</div>';
        } else {
          res.innerHTML='<div style="color:#c0392b;font-size:12px;padding:8px;">'+(r.mensaje||"Sin datos suficientes.")+'</div>';
        }
      } else {
        res.innerHTML='<div style="color:#c0392b;font-size:12px;padding:8px;">'+(r&&r.mensaje?r.mensaje:"Error calculando.")+'</div>';
      }
    })
    .withFailureHandler(function(){
      res.innerHTML='<div style="color:#c0392b;font-size:12px;padding:8px;">Error de conexi\xF3n.</div>';
    })
    .resolverTercerPuestoCategoria(cat, deporte);
};
window.calcularTercerPuestoUI = window.calcularTercerPuestoUI;

function renderGrupo(cont, secciones) {
  var html = "";
  secciones.forEach(function(s){
    var asg = s.defs.filter(function(d){ return !!premiosReg[d.cat]; }).length;
    html += '<div class="pr-seccion"><div class="pr-seccion-head"><div class="pr-seccion-titulo">'+s.lbl+'</div><div class="pr-seccion-count">'+asg+'/'+s.defs.length+' asignados</div></div><div>';
    s.defs.forEach(function(def){
      var reg = premiosReg[def.cat];
      var ganadorH = reg?('<div class="pi-ganador"><div class="pi-ganador-flag">'+flag(reg.bandera||"")+'</div><div><div class="pi-ganador-nombre">'+(reg.nombre_ganador||"")+'</div><div class="pi-ganador-grupo">Grupo '+(reg.grupo||"\u2014")+(reg.pais?" \xB7 "+reg.pais:"")+'</div></div></div>'):"";
      var eqOpts = equiposList.map(function(e){ return '<option value="'+e.id_equipo+'">'+e.grupo+(e.pais?" \u2014 "+e.pais:"")+" ("+e.deporte+")"+'</option>'; }).join("");
      html +=
        '<div class="premio-item">'+
          '<div class="pi-badge '+def.cls+'">'+def.icon+'</div>'+
          '<div class="pi-info">'+
            '<div class="pi-cat">'+def.cat+'</div>'+
            '<div class="pi-desc">'+def.desc+'</div>'+
            '<div class="pi-monto">'+def.monto+'</div>'+
            ganadorH+
            '<div class="pi-form" id="pf-'+def.id+'">'+
              '<div class="pi-form-row">'+
                '<div><label>Ganador/a *</label><input type="text" id="gn-'+def.id+'" placeholder="Nombre completo" value="'+(reg?reg.nombre_ganador||"":"")+'" ></div>'+
                '<div><label>Equipo</label><select id="ge-'+def.id+'"><option value="">&#x2014; Selecciona &#x2014;</option>'+eqOpts+'</select></div>'+
              '</div>'+
              '<div><label>Observaciones</label><input type="text" id="go-'+def.id+'" value="'+(reg?reg.observaciones||"":"")+'"></div>'+
              '<div class="pi-form-btns">'+
                '<button class="btn-guardar-premio" onclick="guardarPremio(\''+def.id+'\',\''+def.cat+'\')">Guardar</button>'+
                '<span class="pr-msg" id="pm-'+def.id+'"></span>'+
              '</div>'+
            '</div>'+
          '</div>'+
          '<div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0">'+
            (reg?'<span class="pi-estado pi-asignado">Asignado</span>':(def.esN?'<span class="pi-estado pi-nuevo">Nuevo</span>':'<span class="pi-estado pi-pendiente">Pendiente</span>'))+
            '<button class="btn-asignar-toggle" data-id="'+def.id+'">'+(reg?"Editar":"Asignar")+'</button>'+
          '</div>'+
        '</div>';
    });
    html += '</div></div>';
  });
  if(typeof cont.innerHTML !== "undefined") cont.innerHTML = (cont.innerHTML||"") + html;
  // Bind toggle
  cont.querySelectorAll(".btn-asignar-toggle").forEach(function(btn){
    btn.addEventListener("click",function(){
      var f = document.getElementById("pf-"+btn.dataset.id);
      if(f) f.classList.toggle("visible");
    });
  });
}

/* flag() removed -> use flagImg */

function guardarPremio(id,cat){
  var nombre=document.getElementById("gn-"+id).value.trim();
  var idEq  =document.getElementById("ge-"+id).value;
  var obs   =document.getElementById("go-"+id).value.trim();
  var msg   =document.getElementById("pm-"+id);
  if(!nombre){msg.className="pr-msg err";msg.textContent="El nombre es requerido.";return;}
  var gr="",pa="",ba="";
  equiposList.forEach(function(e){ if(String(e.id_equipo)===String(idEq)){gr=e.grupo;pa=e.pais;ba=e.bandera_codigo;} });
  msg.className="pr-msg";msg.textContent="Guardando...";
  google.script.run
    .withSuccessHandler(function(r){
      if(r.ok){msg.className="pr-msg ok";msg.textContent="Guardado";premiosReg[cat]={categoria:cat,nombre_ganador:nombre,grupo:gr,pais:pa,bandera:ba,observaciones:obs};setTimeout(function(){msg.textContent="";},2000);}
      else{msg.className="pr-msg err";msg.textContent="Error: "+r.mensaje;}
    })
    .withFailureHandler(function(){msg.className="pr-msg err";msg.textContent="Error de conexi\xF3n.";})
    .registrarPremio({pin: window.getAdminPIN ? window.getAdminPIN() : "", categoria:cat,nombre_ganador:nombre,grupo:gr,pais:pa,bandera:ba,observaciones:obs});
}
window.guardarPremio = guardarPremio;

function cargarCampeon(){
  var body=document.getElementById("campeon-body");
  google.script.run
    .withSuccessHandler(function(r){
      if(!r.ok||!r.datos||!r.datos.length){body.innerHTML='<div class="sin-datos">Sin datos a\xFAn.</div>';return;}
      var l=r.datos[0],fl=flag(l.bandera);
      var html='<div class="camp-general"><div class="camp-titulo">Campe\xF3n Absoluto</div><div class="camp-trofeo">'+fl+'</div><div class="camp-pais">'+(l.pais||l.grupo)+'</div><div class="camp-grupo">Grupo '+l.grupo+' \xB7 Mayor puntaje acumulado</div><div class="camp-pts">'+(l.puntos||0)+' pts \xB7 '+(l.pj||0)+' PJ</div></div>';
      html+='<div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden"><div style="background:#c9a227;padding:12px 18px;font-size:13px;font-weight:700;color:#0a0e1a">Clasificaci\xF3n Final</div><table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr>'+["#","Equipo","PJ","GF","GC","Pts"].map(function(h,i){return '<th style="padding:8px 14px;background:#fdf6e3;font-size:10px;font-weight:600;color:#92400e;text-align:'+(i<=1?"left":"center")+'">'+h+'</th>';}).join("")+'</tr></thead><tbody>';
      r.datos.forEach(function(eq,i){
        html+='<tr style="border-bottom:1px solid #f8fafc;'+(i===0?"background:#fefce8":"")+'"><td style="padding:10px 14px;font-weight:700;color:'+(i===0?"#c9a227":"#94a3b8")+'">'+(i===0?"\uD83D\uDC51":(i+1))+'</td><td style="padding:10px 14px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:20px">'+flag(eq.bandera)+'</span><div><div style="font-weight:600">'+(eq.pais||eq.grupo)+'</div><div style="font-size:11px;color:#94a3b8">Grupo '+eq.grupo+'</div></div></div></td><td style="padding:10px 14px;text-align:center">'+(eq.pj||0)+'</td><td style="padding:10px 14px;text-align:center">'+(eq.gf||0)+'</td><td style="padding:10px 14px;text-align:center">'+(eq.gc||0)+'</td><td style="padding:10px 14px;text-align:center;font-weight:700;color:#0047AB;font-size:15px">'+(eq.puntos||0)+'</td></tr>';
      });
      html+='</tbody></table></div>';
      body.innerHTML=html;
    })
    .withFailureHandler(function(){body.innerHTML='<div class="sin-datos">Error.</div>';})
    .getTablaGeneral();
}

function cargarPresel(){
  var cont=document.getElementById("presel-lista");
  cont.innerHTML='<div class="cargando"><div class="cargando-spinner"></div>Cargando...</div>';
  google.script.run
    .withSuccessHandler(function(r){
      preselList=(r.ok&&r.datos)?r.datos:[];
      if(!preselList.length){cont.innerHTML='<div class="sin-datos">Sin jugadores a\xFAn.</div>';return;}
      cont.innerHTML=preselList.map(function(p){
        return '<div class="presel-fila"><div class="presel-flag">'+flag(p.bandera||"")+'</div><div style="flex:1"><div class="presel-nombre">'+(p.nombre_jugador||"")+'</div><div class="presel-grupo">Grupo '+(p.grupo||"")+" \xB7 "+(p.pais||"")+'</div><span class="presel-pos">'+(p.posicion||"Jugador")+'</span>'+(p.observaciones_docente?'<div class="presel-obs">"'+p.observaciones_docente+'"</div>':"")+'</div></div>';
      }).join("");
    })
    .withFailureHandler(function(){cont.innerHTML='<div class="sin-datos">Error.</div>';})
    .getPreseleccion();
}

function agregarPresel(){
  var nombre=document.getElementById("ps-nombre").value.trim();
  var grupo =document.getElementById("ps-grupo").value;
  var pos   =document.getElementById("ps-posicion").value;
  var gen   =document.getElementById("ps-genero").value;
  var obs   =document.getElementById("ps-obs").value.trim();
  var msg   =document.getElementById("ps-msg");
  if(!nombre||!grupo){msg.className="pr-msg err";msg.textContent="Nombre y grupo requeridos.";return;}
  msg.className="pr-msg";msg.textContent="Guardando...";
  google.script.run
    .withSuccessHandler(function(r){
      if(r.ok){msg.className="pr-msg ok";msg.textContent="Agregado";document.getElementById("ps-nombre").value="";document.getElementById("ps-obs").value="";setTimeout(function(){msg.textContent="";cargarPresel();},1500);}
      else{msg.className="pr-msg err";msg.textContent="Error: "+r.mensaje;}
    })
    .withFailureHandler(function(){msg.className="pr-msg err";msg.textContent="Error de conexi\xF3n.";})
    .marcarPreseleccion({pin: window.getAdminPIN ? window.getAdminPIN() : "", nombre_jugador:nombre,grupo:grupo,posicion:pos,genero:gen,observaciones_docente:obs});
}
window.agregarPresel = agregarPresel;

function exportarPresel(){
  if(!preselList.length){alert("No hay jugadores.");return;}
  var t="PRE-SELECCION INTERCOLEGIADOS \u2014 MUNDIAL GABO 2026\nI.E. GABO \xB7 Cartago\n============================\n\n";
  preselList.forEach(function(p,i){ t+=(i+1)+". "+p.nombre_jugador+" | Grupo "+p.grupo+" | "+p.posicion+(p.observaciones_docente?"\n   Obs: "+p.observaciones_docente:"")+"\n"; });
  var a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([t],{type:"text/plain;charset=utf-8"}));
  a.download="Preseleccion_GABO_2026.txt";a.click();
}
window.exportarPresel = exportarPresel;
