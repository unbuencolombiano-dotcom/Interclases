<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; color: #000; background: #fff; margin:0; padding:10px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
    th, td { border: 1px solid #000; padding: 6px; text-align: left; }
    th { background: #f0f0f0; font-weight: bold; text-align: center; }
    .header { text-align: center; margin-bottom: 20px; font-weight: bold; font-size: 16px; border-bottom: 2px solid #000; padding-bottom: 10px; }
    .team-title { text-align: center; font-weight: bold; font-size: 14px; background: #eee; }
    .col-num { width: 40px; text-align: center; }
    .col-name { width: auto; }
    .col-goals { width: 60px; }
    .col-cards { width: 60px; }
    .signatures { margin-top: 30px; width: 100%; }
    .sig-box { width: 32%; display: inline-block; text-align: center; font-size: 11px; }
    .sig-line { width: 80%; border-bottom: 1px solid #000; margin: 0 auto 5px auto; height: 30px; }
  </style>
</head>
<body>
  <div class="header">
    FICHA DE ÁRBITRO - MUNDIAL GABO 2026<br>
    <span style="font-size:12px; font-weight:normal">
      Partido ID: <?= p.id_partido ?> | Deporte: <?= p.deporte ?> | Grado: <?= p.grado ?>°<br>
      <?= p.grupo_local ?> (<?= p.pais_local || 'Local' ?>) vs <?= p.grupo_visitante ?> (<?= p.pais_visitante || 'Visitante' ?>)<br>
      <?= p.fecha || 'Sin fecha' ?> <?= p.hora || '' ?>
    </span>
  </div>

  <table>
    <tr>
      <td style="width:50%; vertical-align:top; border:none; padding-right:5px;">
        <table>
          <tr><td colspan="4" class="team-title">LOCAL: <?= p.grupo_local ?> (<?= p.pais_local || 'Local' ?>)</td></tr>
          <tr><th class="col-num">#</th><th class="col-name">Jugador</th><th class="col-goals">Goles</th><th class="col-cards">TA/TR</th></tr>
          <? for (var i = 0; i < Math.max(jugLocal.length, 12); i++) { ?>
            <? var j = jugLocal[i] || null; ?>
            <tr>
              <td class="col-num"><?= j ? j.numero_camiseta : '' ?></td>
              <td class="col-name"><?= j ? j.nombre_completo : '' ?></td>
              <td></td><td></td>
            </tr>
          <? } ?>
        </table>
      </td>
      <td style="width:50%; vertical-align:top; border:none; padding-left:5px;">
        <table>
          <tr><td colspan="4" class="team-title">VISITANTE: <?= p.grupo_visitante ?> (<?= p.pais_visitante || 'Visitante' ?>)</td></tr>
          <tr><th class="col-num">#</th><th class="col-name">Jugador</th><th class="col-goals">Goles</th><th class="col-cards">TA/TR</th></tr>
          <? for (var i = 0; i < Math.max(jugVisit.length, 12); i++) { ?>
            <? var j = jugVisit[i] || null; ?>
            <tr>
              <td class="col-num"><?= j ? j.numero_camiseta : '' ?></td>
              <td class="col-name"><?= j ? j.nombre_completo : '' ?></td>
              <td></td><td></td>
            </tr>
          <? } ?>
        </table>
      </td>
    </tr>
  </table>

  <table>
    <tr>
      <td style="width:33%; vertical-align:top"><strong>Marcador Final:</strong><br><br>Local: ____ Visitante: ____</td>
      <td style="width:33%; vertical-align:top"><strong>¿Hubo W.O.?</strong><br><br>[ ] Local &nbsp;&nbsp;&nbsp; [ ] Visitante</td>
      <td style="width:34%; vertical-align:top; height:60px;"><strong>Observaciones:</strong></td>
    </tr>
  </table>

  <div class="signatures">
    <div class="sig-box"><div class="sig-line"></div>Firma Árbitro</div>
    <div class="sig-box"><div class="sig-line"></div>Capitán Local<br><b><?= capLocal || '________________' ?></b></div>
    <div class="sig-box"><div class="sig-line"></div>Capitán Visitante<br><b><?= capVisit || '________________' ?></b></div>
  </div>
</body>
</html>
